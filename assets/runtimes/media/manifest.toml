bundle_version = "2026-06-21-media.5"
compatibility_reference = "POC-confirmed LCD owned slots at page 0 / element 13 / events 0 and 8, with live IMMEDIATE calls framed as <?lua ... ?>"
runtime_marker = "vsn1-cli:2026-06-21-media.5"

compatibility_notes = [
  "This runtime owns the same LCD init and LCD draw slots as the validated default runtime.",
  "It targets media playback use cases with a persistent base layer plus a temporary playback-status overlay.",
  "Duration and position stay integer seconds in the public field contract and are formatted on-device as mm:ss.",
]

[[layers]]
name = "base"
priority = 0
activation = "persistent"
notes = "Primary media metadata and progress layer."

[[layers]]
name = "playback_status"
priority = 10
activation = "temporary"
timeout_ms = 2000
notes = "Temporary playback state overlay shown above the base layer."

[[owned_slots]]
name = "lcd-init"
page = 0
element = 13
event = 0
asset = "lcd-init.lua"
install_order = 10
runtime_marker = "vsn1-cli:2026-06-21-media.5:lcd-init"

[[owned_slots]]
name = "lcd-draw"
page = 0
element = 13
event = 8
asset = "lcd-draw.lua"
install_order = 20
runtime_marker = "vsn1-cli:2026-06-21-media.5:lcd-draw"

[[fields]]
name = "base.artist"
layer = "base"
value_kind = "text"
runtime_key = "a"
clear_value = ""
notes = "Artist line shown above the title."

[[fields]]
name = "base.title"
layer = "base"
value_kind = "text"
runtime_key = "t"
clear_value = ""
notes = "Primary track title."

[[fields]]
name = "base.album"
layer = "base"
value_kind = "text"
runtime_key = "l"
clear_value = ""
notes = "Album line shown under the title."

[[fields]]
name = "base.duration"
layer = "base"
value_kind = "float"
runtime_key = "d"
clear_value = 0.0
notes = "Track duration in whole seconds, formatted on-device as mm:ss."

[[fields]]
name = "base.position"
layer = "base"
value_kind = "float"
runtime_key = "p"
clear_value = 0.0
notes = "Current playback position in whole seconds, formatted on-device as mm:ss."

[[fields]]
name = "playback_status.status"
layer = "playback_status"
value_kind = "text"
runtime_key = "s"
clear_value = ""
notes = "Temporary playback status text such as Playing or Paused."
